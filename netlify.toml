[build]
  publish = "."
  functions = "netlify/functions"
  command = "npm install"

[build.environment]
  NODE_VERSION = "20.17.0"

# Redirecionar TUDO para função api (Express server)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api:path"
  status = 200

# Servir arquivos estáticos (HTML)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = { Role = ["*"] }