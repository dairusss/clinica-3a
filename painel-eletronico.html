<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Eletrônico - Fila da Clínica 3A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-image: url("assets/logo-bg.svg"), linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-repeat: no-repeat, no-repeat;
            background-position: center 15%, center;
            background-size: 50% auto, cover;
            background-attachment: fixed;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px currentColor; }
            50% { box-shadow: 0 0 40px currentColor; }
        }

        .container {
            width: 100%;
            max-width: 1400px;
            padding: 20px;
        }

        .titulo {
            text-align: center;
            color: white;
            font-size: 56px;
            font-weight: 900;
            margin-bottom: 50px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
            letter-spacing: 3px;
            animation: slideDown 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 35px;
            margin-bottom: 50px;
            animation: fadeIn 0.8s ease-out;
        }

        .box {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 45px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }
        
        .box::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 300px;
            height: 300px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .box:hover {
            transform: translateY(-12px) scale(1.02);
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }

        .box.atendendo {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            border: 5px solid #c92a2a;
            animation: glow 2s ease-in-out infinite;
            color: white;
        }

        .box.proximo {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a5a5 100%);
            border: 5px solid #0a9396;
            color: white;
        }

        .box.ultima {
            background: linear-gradient(135deg, #ffa94d 0%, #fd7e14 100%);
            border: 5px solid #d9480f;
            color: white;
        }

        .label {
            font-size: 28px;
            font-weight: 800;
            color: rgba(255,255,255,0.95);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
        }

        .numero {
            font-size: 160px;
            font-weight: 900;
            color: white;
            line-height: 1;
            text-shadow: 4px 4px 12px rgba(0,0,0,0.5);
            animation: bounce 2s ease-in-out infinite;
        }

        .subtitulo {
            font-size: 16px;
            color: rgba(255,255,255,0.8);
            margin-top: 10px;
        }

        .fila-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            animation: fadeIn 0.8s ease-out;
            backdrop-filter: blur(10px);
        }

        .fila-titulo {
            font-size: 36px;
            font-weight: 800;
            color: #1e3c72;
            margin-bottom: 30px;
            text-align: center;
            letter-spacing: 1px;
        }

        .fila-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 18px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
        }
        
        .fila-items::-webkit-scrollbar {
            width: 8px;
        }
        
        .fila-items::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }
        
        .fila-items::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .fila-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 15px;
            border-radius: 18px;
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fila-item:hover {
            transform: scale(1.1);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .fila-item.proximo {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            font-size: 36px;
            box-shadow: 0 8px 30px rgba(245, 87, 108, 0.5);
            animation: bounce 1s ease-in-out infinite;
        }

        .status {
            margin-top: 30px;
            text-align: center;
            color: #666;
            font-size: 16px;
        }

        .status.online {
            color: #4caf50;
            font-weight: bold;
        }

        .status.offline {
            color: #f44336;
            font-weight: bold;
        }

        .indicador {
            display: inline-block;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .indicador.online {
            background: #4caf50;
        }

        .indicador.offline {
            background: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
        }

        .info-footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 14px;
        }

        .horario {
            font-size: 18px;
            font-weight: bold;
        }

        @media (max-width: 1200px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
            .numero {
                font-size: 120px;
            }
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .titulo {
                font-size: 40px;
                letter-spacing: 1px;
            }
            .numero {
                font-size: 90px;
            }
            .label {
                font-size: 22px;
            }
        }

        /* Efeito de zoom para atenção */
        @keyframes zoom-in {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .novo {
            animation: zoom-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="titulo">
            🏥 PAINEL DE FILA - CLÍNICA
        </div>

        <div class="grid">
            <div class="box atendendo">
                <div class="label">Atendendo Agora</div>
                <div class="numero" id="atendendo">---</div>
                <div class="subtitulo" id="consultorio">Consultório ---</div>
            </div>

            <div class="box proximo">
                <div class="label">Próximo a Chamar</div>
                <div class="numero" id="proximo">---</div>
                <div class="subtitulo">Posição 1</div>
            </div>

            <div class="box ultima">
                <div class="label">Última Chamada</div>
                <div class="numero" id="ultima">---</div>
                <div class="subtitulo">Chamado em</div>
            </div>
        </div>

        <div class="fila-container">
            <div class="fila-titulo">Próximos na Fila</div>
            <div class="fila-items" id="fila">
                <div class="fila-item">Aguardando...</div>
            </div>
            <div class="status offline">
                <span class="indicador offline"></span>
                Carregando...
            </div>
            <div id="status-sistema" class="status offline"></div>
        </div>
    </div>

    <div class="info-footer">
        <div class="horario" id="hora">00:00:00</div>
        <div style="margin-top: 5px;">Atualizado em tempo real</div>
    </div>

    <script>
        const API_URL = window.location.origin !== 'null' ? window.location.origin : 'http://localhost:3000';
        let ultimoNumero = null;

        // Atualizar hora
        function atualizarHora() {
            const agora = new Date();
            const hora = String(agora.getHours()).padStart(2, '0');
            const min = String(agora.getMinutes()).padStart(2, '0');
            const seg = String(agora.getSeconds()).padStart(2, '0');
            document.getElementById('hora').textContent = `${hora}:${min}:${seg}`;
        }
        setInterval(atualizarHora, 1000);
        atualizarHora();

        // Função para atualizar painel
        async function atualizarPainel() {
            try {
                const [resAtendimento, resProximo, resFila, resHistorico] = await Promise.all([
                    fetch(`${API_URL}/api/pacientes/atendimento-atual`),
                    fetch(`${API_URL}/api/pacientes/proximo`),
                    fetch(`${API_URL}/api/pacientes/fila`),
                    fetch(`${API_URL}/api/recepcao/historico?limite=1`)
                ]);

                const dataAtendimento = await resAtendimento.json();
                const dataProximo = await resProximo.json();
                const dataFila = await resFila.json();
                const dataHistorico = await resHistorico.json();

                // Atualizar atendimento atual
                if (dataAtendimento.success && dataAtendimento.data) {
                    const atual = dataAtendimento.data;
                    document.getElementById('atendendo').textContent = atual.numero_senha;
                    document.getElementById('consultorio').textContent = atual.local_atendimento || 'Consultório ---';
                } else {
                    document.getElementById('atendendo').textContent = '---';
                    document.getElementById('consultorio').textContent = 'Consultório ---';
                }

                // Atualizar próximo
                if (dataProximo.success && dataProximo.data) {
                    const numero = dataProximo.data.numero_senha;
                    
                    if (numero !== ultimoNumero) {
                        document.getElementById('proximo').innerHTML = numero;
                        document.getElementById('proximo').parentElement.classList.add('novo');
                        setTimeout(() => {
                            document.getElementById('proximo').parentElement.classList.remove('novo');
                        }, 300);
                        ultimoNumero = numero;
                    } else {
                        document.getElementById('proximo').innerHTML = numero;
                    }
                } else {
                    document.getElementById('proximo').textContent = '---';
                }

                // Atualizar fila
                if (dataFila.success && dataFila.data) {
                    const filaHtml = dataFila.data
                        .slice(0, 10)
                        .map((item, idx) => {
                            const classe = idx === 0 ? 'fila-item proximo' : 'fila-item';
                            return `<div class="${classe}">${item.numero_senha}</div>`;
                        })
                        .join('');
                    
                    document.getElementById('fila').innerHTML = filaHtml || '<div class="fila-item">Fila vazia</div>';
                }

                // Atualizar última chamada
                if (dataHistorico.success && dataHistorico.data && dataHistorico.data.length > 0) {
                    document.getElementById('ultima').textContent = dataHistorico.data[0].numero_senha;
                } else {
                    document.getElementById('ultima').textContent = '---';
                }

                // Status online
                const statusEl = document.getElementById('status-sistema');
                statusEl.innerHTML = '<span class="indicador online"></span> Sistema Online';
                statusEl.classList.remove('offline');
                statusEl.classList.add('online');

            } catch (erro) {
                console.error('Erro ao atualizar:', erro);
                
                document.getElementById('proximo').textContent = '---';
                document.getElementById('atendendo').textContent = '---';
                document.getElementById('ultima').textContent = '---';
                document.getElementById('consultorio').textContent = 'Consultório ---';
                
                const statusEl = document.getElementById('status-sistema');
                statusEl.innerHTML = '<span class="indicador offline"></span> Sistema Offline';
                statusEl.classList.add('offline');
                statusEl.classList.remove('online');
            }
        }

        // Atualizar a cada 2 segundos
        atualizarPainel();
        setInterval(atualizarPainel, 2000);

        // Efeito de som quando novo número (opcional)
        function tocarSom() {
            // Comentado por padrão
            // const audio = new Audio('data:audio/wav;base64,...');
            // audio.play();
        }
    </script>
</body>
</html>
