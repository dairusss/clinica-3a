<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <filter id="bg-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Círculo externo grande (sombra) -->
  <circle cx="400" cy="400" r="280" fill="#a71d1d" filter="url(#bg-shadow)" opacity="0.3"/>
  <!-- Círculo principal grande -->
  <circle cx="400" cy="400" r="270" fill="#c62828" opacity="0.25"/>
  <!-- Texto 3A grande -->
  <text x="400" y="520" font-family="Arial, Helvetica, sans-serif" font-size="420" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-10" opacity="0.12">3A</text>
</svg>
