<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <!-- Círculo externo (sombra) -->
  <circle cx="100" cy="100" r="95" fill="#a71d1d" filter="url(#shadow)"/>
  <!-- Círculo principal vermelho -->
  <circle cx="100" cy="100" r="90" fill="#c62828"/>
  <!-- Texto 3A -->
  <text x="100" y="135" font-family="Arial, Helvetica, sans-serif" font-size="100" font-weight="900" fill="white" text-anchor="middle" letter-spacing="-2">3A</text>
</svg>
