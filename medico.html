<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Médico - Clinica 3A</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes slideInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #2d5364 100%);
            background-image: url("assets/logo-bg.svg"), linear-gradient(135deg, #667eea 0%, #764ba2 50%, #2d5364 100%);
            background-repeat: no-repeat, no-repeat;
            background-position: center 18%, center;
            background-size: 45% auto, cover;
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.99);
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 40px rgba(102, 126, 234, 0.1);
            overflow: hidden;
            animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 250px;
            height: 250px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            animation: pulse 4s ease-in-out infinite;
        }

        .header img.logo {
            width: 140px;
            max-width: 100%;
            height: auto;
            border-radius: 20px;
            background: rgba(255,255,255,0.15);
            padding: 12px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.2);
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }
        
        .header img.logo:hover {
            transform: scale(1.08) rotateZ(-2deg);
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            font-weight: 800;
            position: relative;
            z-index: 1;
        }

        .header p {
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 35px;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out;
        }

        .btn {
            padding: 22px;
            border: none;
            border-radius: 15px;
            font-size: 1.15em;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .btn:hover::after {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
            color: #333;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
        }

        .current-patient {
            background: linear-gradient(135deg, #f0f9ff 0%, #e8f5ff 100%);
            border: none;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(102, 126, 234, 0.15);
            animation: fadeIn 0.8s ease-out;
        }

        .current-patient h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .patient-info {
            font-size: 1.15em;
            margin-bottom: 10px;
            color: #444;
        }

        .patient-name {
            font-weight: bold;
            color: #333;
        }

        .patient-senha {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .status-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-chamado {
            background: #fff3cd;
            color: #856404;
        }

        .status-atendendo {
            background: #d1ecf1;
            color: #0c5460;
        }

        .queue-info {
            background: linear-gradient(135deg, #eef6ff 0%, #dde8fb 100%);
            border-radius: 18px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.12);
            animation: fadeIn 0.8s ease-out;
        }

        .queue-info h4 {
            color: #2c3e50;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .queue-stats {
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #6c757d;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }

        .recent-calls {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
        }

        .recent-calls h4 {
            color: #495057;
            margin-bottom: 15px;
        }

        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .call-item:last-child {
            border-bottom: none;
        }

        .call-info {
            flex: 1;
        }

        .call-senha {
            font-weight: bold;
            color: #667eea;
        }

        .call-time {
            font-size: 0.9em;
            color: #6c757d;
        }

        .call-status {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .call-status.chamado {
            background: #fff3cd;
            color: #856404;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
            text-align: center;
            margin-bottom: 20px;
        }

        .header img.logo {
            width: 140px;
            max-width: 100%;
            height: auto;
            border-radius: 18px;
            background: rgba(255,255,255,0.12);
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.12);
        }

        .call-status.atendendo {
            background: #d1ecf1;
            color: #0c5460;
        }

        .call-status.finalizado {
            background: #d4edda;
            color: #155724;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <img class="logo" src="assets/logo.svg" alt="Diagnóstico Clínica Médica" />
            <h1>👨‍⚕️ Painel Médico</h1>
            <p>Controle de atendimento da clínica</p>
        </div>

        <!-- Content -->
        <div class="content">
            <!-- Mensagens -->
            <div id="message-container"></div>

            <!-- Paciente Atual -->
            <div id="current-patient-container" class="hidden">
                <div class="current-patient">
                    <h3>PACIENTE ATUAL</h3>
                    <div class="patient-info">
                        <div class="patient-name" id="current-patient-name">-</div>
                        <div class="patient-senha" id="current-patient-senha">-</div>
                        <div class="status-indicator" id="current-patient-status">-</div>
                    </div>
                </div>
            </div>

            <!-- Estatísticas da Fila -->
            <div class="queue-info">
                <h4>📊 Status da Fila</h4>
                <div class="queue-stats">
                    <div class="stat-item">
                        <div class="stat-number" id="total-fila">-</div>
                        <div class="stat-label">Na Fila</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="chamados-hoje">-</div>
                        <div class="stat-label">Atendidos Hoje</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="tempo-medio">-</div>
                        <div class="stat-label">Tempo Médio (min)</div>
                    </div>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="chamarProximo()">
                    📢 Chamar Próximo
                </button>
                <button class="btn btn-success" onclick="iniciarAtendimento()">
                    ▶️ Iniciar Atendimento
                </button>
                <button class="btn btn-warning" onclick="finalizarAtendimento()">
                    ✅ Finalizar Atendimento
                </button>
                <button class="btn btn-danger" onclick="atualizarStatus()">
                    🔄 Atualizar
                </button>
            </div>

            <!-- Chamadas Recentes -->
            <div class="recent-calls">
                <h4>📝 Chamadas Recentes</h4>
                <div id="recent-calls-list">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Carregando histórico...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pacienteAtual = null;

        // Inicializar
        window.addEventListener('load', function() {
            atualizarStatus();
            carregarHistorico();
        });

        async function chamarProximo() {
            mostrarLoading('Chamando próximo paciente...');

            try {
                const response = await fetch('http://localhost:3000/api/recepcao/chamar-proximo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao chamar paciente');
                }

                pacienteAtual = data.data;
                mostrarSucesso(`Paciente ${pacienteAtual.numero_senha} chamado com sucesso!`);
                atualizarStatus();
                tocarSomChamada();

            } catch (error) {
                mostrarErro('Erro ao chamar paciente: ' + error.message);
            }
        }

        async function iniciarAtendimento() {
            if (!pacienteAtual) {
                mostrarErro('Nenhum paciente chamado para iniciar atendimento');
                return;
            }

            mostrarLoading('Iniciando atendimento...');

            try {
                const response = await fetch(`http://localhost:3000/api/recepcao/iniciar/${pacienteAtual.numero_senha}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        local_atendimento: 'Consultório 1',
                        profissional: 'Dr. Silva'
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao iniciar atendimento');
                }

                mostrarSucesso('Atendimento iniciado com sucesso!');
                atualizarStatus();

            } catch (error) {
                mostrarErro('Erro ao iniciar atendimento: ' + error.message);
            }
        }

        async function finalizarAtendimento() {
            if (!pacienteAtual) {
                mostrarErro('Nenhum paciente em atendimento para finalizar');
                return;
            }

            mostrarLoading('Finalizando atendimento...');

            try {
                const response = await fetch(`http://localhost:3000/api/recepcao/finalizar/${pacienteAtual.numero_senha}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao finalizar atendimento');
                }

                mostrarSucesso('Atendimento finalizado com sucesso!');
                pacienteAtual = null;
                atualizarStatus();

            } catch (error) {
                mostrarErro('Erro ao finalizar atendimento: ' + error.message);
            }
        }

        async function atualizarStatus() {
            try {
                // Buscar estatísticas
                const statsResponse = await fetch('http://localhost:3000/api/recepcao/estatisticas');
                const statsData = await statsResponse.json();

                if (statsResponse.ok) {
                    document.getElementById('total-fila').textContent = statsData.data.total_na_fila || 0;
                    document.getElementById('chamados-hoje').textContent = statsData.data.atendidos_hoje || 0;
                    document.getElementById('tempo-medio').textContent = statsData.data.tempo_medio_minutos || 0;
                }

                // Buscar paciente atual (último chamado)
                const historicoResponse = await fetch('http://localhost:3000/api/recepcao/historico?limite=1');
                const historicoData = await historicoResponse.json();

                if (historicoResponse.ok && historicoData.data && historicoData.data.length > 0) {
                    const ultimo = historicoData.data[0];
                    if (ultimo.status === 'CHAMADA' || ultimo.status === 'EM_ATENDIMENTO') {
                        pacienteAtual = ultimo;
                        exibirPacienteAtual(ultimo);
                    } else {
                        pacienteAtual = null;
                        ocultarPacienteAtual();
                    }
                } else {
                    pacienteAtual = null;
                    ocultarPacienteAtual();
                }

            } catch (error) {
                console.error('Erro ao atualizar status:', error);
            }
        }

        function exibirPacienteAtual(paciente) {
            document.getElementById('current-patient-container').classList.remove('hidden');
            document.getElementById('current-patient-name').textContent = paciente.nome || 'Nome não informado';
            document.getElementById('current-patient-senha').textContent = String(paciente.numero_senha).padStart(4, '0');

            const statusEl = document.getElementById('current-patient-status');
            if (paciente.status === 'CHAMADA') {
                statusEl.textContent = 'CHAMADO';
                statusEl.className = 'status-indicator status-chamado';
            } else if (paciente.status === 'EM_ATENDIMENTO') {
                statusEl.textContent = 'EM ATENDIMENTO';
                statusEl.className = 'status-indicator status-atendendo';
            }
        }

        function ocultarPacienteAtual() {
            document.getElementById('current-patient-container').classList.add('hidden');
        }

        async function carregarHistorico() {
            try {
                const response = await fetch('http://localhost:3000/api/recepcao/historico?limite=10');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Erro ao carregar histórico');
                }

                exibirHistorico(data.data);

            } catch (error) {
                document.getElementById('recent-calls-list').innerHTML = '<div class="error">Erro ao carregar histórico</div>';
            }
        }

        function exibirHistorico(historico) {
            const container = document.getElementById('recent-calls-list');

            if (!historico || historico.length === 0) {
                container.innerHTML = '<p style="text-align: center; color: #6c757d; padding: 20px;">Nenhuma chamada recente</p>';
                return;
            }

            let html = '';
            historico.forEach(item => {
                const hora = new Date(item.chamada_em || item.data_emissao).toLocaleTimeString('pt-BR');
                let statusClass = 'chamado';
                if (item.status === 'EM_ATENDIMENTO') statusClass = 'atendendo';
                if (item.status === 'ATENDIDO') statusClass = 'finalizado';

                html += `
                    <div class="call-item">
                        <div class="call-info">
                            <div class="call-senha">${String(item.numero_senha).padStart(4, '0')}</div>
                            <div class="call-time">${hora}</div>
                        </div>
                        <div class="call-status ${statusClass}">${item.status}</div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        function mostrarLoading(mensagem) {
            const container = document.getElementById('message-container');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>${mensagem}</p>
                </div>
            `;
        }

        function mostrarSucesso(mensagem) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="success">${mensagem}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }

        function mostrarErro(mensagem) {
            const container = document.getElementById('message-container');
            container.innerHTML = `<div class="error">${mensagem}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        function tocarSomChamada() {
            // Tocar som de chamada (beep longo)
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = 1000;
                oscillator.type = 'sine';

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 1);
            } catch (e) {
                console.log('Não foi possível tocar som');
            }
        }

        // Atualizar automaticamente a cada 30 segundos
        setInterval(() => {
            atualizarStatus();
            carregarHistorico();
        }, 30000);
    </script>
</body>
</html>
